name: frame_guide
description: "AI-powered camera app that provides real-time composition guidance for better portraits."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # 相机
  camera: ^0.11.0+2
  
  # 状态管理
  flutter_riverpod: ^2.5.1
  
  # 导航
  go_router: ^14.2.0
  
  # 本地存储
  shared_preferences: ^2.2.3
  
  # 图片相关
  image_picker: ^1.1.2
  path_provider: ^2.1.3
  
  # UI 工具
  google_fonts: 6.0.0
  flutter_animate: ^4.5.0
  
  # 网络
  http: ^1.2.1
  
  # ML Kit 人像检测
  google_mlkit_face_detection: ^0.11.0
  
  # 权限
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
