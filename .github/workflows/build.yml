name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Fix corrupted Android SDK
        run: |
          SDK_ROOT="$ANDROID_SDK_ROOT"
          if [ -f "$SDK_ROOT/platforms/android-35/android.jar" ]; then
            # Check if android-35 is corrupted
            if ! unzip -t "$SDK_ROOT/platforms/android-35/android.jar" &>/dev/null; then
              echo "Android SDK 35 is corrupted, removing..."
              rm -rf "$SDK_ROOT/platforms/android-35"
              rm -rf "$SDK_ROOT/build-tools/35.*"
            fi
          fi
          # Ensure android-34 exists as fallback
          if [ ! -d "$SDK_ROOT/platforms/android-34" ]; then
            yes | "$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --install "platforms;android-34" 2>/dev/null || \
            yes | "$SDK_ROOT/tools/bin/sdkmanager" --install "platforms;android-34" 2>/dev/null || true
          fi

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web

  deploy-web:
    needs: build-web
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: build/web

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
